<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Cannabis Farm — Grow Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #111111;
    --green-forest: #2d4a27;
    --green-mid: #4f7942;
    --green-leaf: #6aaa5a;
    --earth: #8b6f47;
    --cream: #f7f4ee;
    --status-success: #3f8f5f;
    --status-warning: #c99a3e;
    --status-danger: #c0503f;
    --surface-1: #111111;
    --surface-2: #1a1c19;
    --surface-3: #22261f;
    --text-primary: #f2efe6;
    --text-muted: #a8a99c;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Inter', Arial, sans-serif;
    --font-mono: 'Space Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--surface-1);
    color: var(--text-primary);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    padding-bottom: 84px;
  }

  a { color: inherit; }

  /* ============ HEADER ============ */
  header.app-header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--surface-1);
    border-bottom: 1px solid #262922;
    padding: 14px 18px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header.app-header img { width: 34px; height: 34px; border-radius: 8px; }
  header.app-header .wordmark {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 19px;
    letter-spacing: 0.3px;
    line-height: 1;
  }
  header.app-header .wordmark .accent { color: var(--green-mid); }
  header.app-header .subtitle {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--green-leaf);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  main { padding: 16px; max-width: 560px; margin: 0 auto; }

  /* ============ SECTION LABELS ============ */
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green-leaf);
    margin-bottom: 6px;
  }
  h1.page-title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 26px;
    margin: 0 0 18px;
  }

  /* ============ CARDS ============ */
  .card {
    background: var(--surface-2);
    border: 1px solid #262922;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 6px 16px rgba(0,0,0,0.25);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(106,170,90,0.35), transparent);
  }

  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--surface-2);
    border: 1px solid #262922;
    border-radius: 12px;
    padding: 12px 10px;
    text-align: center;
  }
  .stat-card .num {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 26px;
    color: var(--green-leaf);
  }
  .stat-card .label {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ============ TASK LIST ============ */
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid #262922;
  }
  .task-item:last-child { border-bottom: none; }
  .task-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green-leaf);
    margin-top: 6px; flex-shrink: 0;
  }
  .task-dot.warn { background: var(--status-warning); }
  .task-text { font-size: 14px; line-height: 1.4; }
  .task-text .sub { color: var(--text-muted); font-size: 12px; margin-top: 2px; }

  .empty-state {
    text-align: center;
    padding: 30px 10px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ============ ZONE GROUPS ============ */
  .zone-group { margin-bottom: 20px; }
  .zone-heading {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 10px;
  }
  .zone-heading h2 {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    margin: 0;
  }
  .zone-heading .tag {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--earth);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ============ PLANT CARD ============ */
  .plant-card { display: flex; gap: 14px; align-items: center; cursor: pointer; }
  .ring-wrap { position: relative; width: 62px; height: 62px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: #2a2d26; stroke-width: 5; }
  .ring-fg { fill: none; stroke: var(--green-leaf); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
  .ring-day {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
  }
  .plant-info { flex: 1; min-width: 0; }
  .plant-info .name { font-weight: 600; font-size: 15px; }
  .plant-info .strain { color: var(--text-muted); font-size: 12px; margin-top: 1px; }
  .plant-info .stage-badge {
    display: inline-block;
    margin-top: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    background: rgba(106,170,90,0.15);
    color: var(--green-leaf);
    letter-spacing: 0.5px;
  }
  .plant-info .stage-badge.unconfirmed { background: rgba(201,154,62,0.15); color: var(--status-warning); }
  .plant-info .target {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .harvest-flag {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--status-warning);
    text-transform: uppercase;
    margin-top: 4px;
  }
  .chev { color: var(--text-muted); font-size: 18px; }

  /* ============ BUTTONS ============ */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    width: 100%;
  }
  .btn-primary { background: var(--green-mid); color: white; }
  .btn-primary:active { background: var(--green-forest); }
  .btn-ghost { background: transparent; border: 1px solid #3a3e34; color: var(--text-primary); }
  .btn-small { width: auto; padding: 8px 14px; font-size: 13px; }

  .add-plant-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px dashed #3a3e34;
    background: transparent;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 4px;
  }

  /* ============ FORMS ============ */
  label {
    display: block;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin: 12px 0 5px;
  }
  input, select, textarea {
    width: 100%;
    background: var(--surface-3);
    border: 1px solid #33372e;
    border-radius: 8px;
    padding: 11px 12px;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 14px;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--green-leaf);
  }
  textarea { resize: vertical; min-height: 60px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ============ MODAL ============ */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    display: none;
    align-items: flex-end;
  }
  .modal-backdrop.open { display: flex; }
  .modal-sheet {
    background: var(--surface-2);
    border-radius: 18px 18px 0 0;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    padding: 20px 18px 28px;
    border-top: 1px solid #2f332a;
  }
  .modal-sheet h2 { font-family: var(--font-display); font-size: 20px; margin: 0 0 4px; }
  .modal-sheet .modal-sub { color: var(--text-muted); font-size: 12px; margin-bottom: 14px; }
  .modal-close {
    position: sticky; top: 0; float: right;
    background: var(--surface-3); border: none; color: var(--text-primary);
    width: 30px; height: 30px; border-radius: 50%; font-size: 16px; cursor: pointer;
  }

  .warning-banner {
    background: rgba(201,154,62,0.12);
    border: 1px solid rgba(201,154,62,0.4);
    color: var(--status-warning);
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
  .warning-banner.show { display: block; }

  .success-banner {
    background: rgba(63,143,95,0.12);
    border: 1px solid rgba(63,143,95,0.4);
    color: var(--status-success);
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
  .success-banner.show { display: block; }

  /* ============ LOG HISTORY ============ */
  .log-entry {
    border-bottom: 1px solid #262922;
    padding: 10px 0;
    font-size: 12px;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-entry .log-date { font-family: var(--font-mono); color: var(--green-leaf); }
  .log-entry .log-meta { color: var(--text-muted); margin-top: 2px; }
  .log-entry .log-obs { margin-top: 3px; }

  /* ============ CALCULATOR ============ */
  .calc-result {
    margin-top: 16px;
    background: var(--surface-3);
    border-radius: 12px;
    padding: 16px;
    display: none;
  }
  .calc-result.show { display: block; }
  .calc-formula {
    font-family: var(--font-mono);
    font-size: 15px;
    color: var(--text-primary);
    margin-bottom: 10px;
  }
  .calc-formula .eq { color: var(--green-leaf); font-weight: 700; }
  .calc-assessment {
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 8px;
    line-height: 1.4;
  }
  .calc-assessment.ok { background: rgba(63,143,95,0.15); color: var(--status-success); }
  .calc-assessment.warn { background: rgba(201,154,62,0.15); color: var(--status-warning); }
  .calc-assessment.neutral { background: rgba(168,169,156,0.12); color: var(--text-muted); }

  /* ============ BOTTOM NAV ============ */
  nav.bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface-1);
    border-top: 1px solid #262922;
    display: flex;
    z-index: 30;
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav.bottom-nav button {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 12px 4px 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  nav.bottom-nav button .icon { font-size: 18px; }
  nav.bottom-nav button.active { color: var(--green-leaf); }
  nav.bottom-nav button.active .icon { filter: drop-shadow(0 0 6px rgba(106,170,90,0.5)); }

  .loading-spin {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 12px;
  }

  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>

// ============================================================
// API HELPER
// ============================================================
async function callApi(action, params) {
  params = params || {};
  const qs = new URLSearchParams(Object.assign({ action: action }, params));
  const res = await fetch(APPS_SCRIPT_URL + '?' + qs.toString());
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return String(d);
  return dt.toLocaleDateString('en-ZA', { day: '2-digit', month: 'short', year: 'numeric' });
}

function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ============================================================
// STATE
// ============================================================
let state = {
  view: 'dashboard',
  zones: [],
  plants: [],
  dashboard: null,
  cures: []
};

async function loadAll() {
  const [zones, plants, dashboard, cures] = await Promise.all([
    callApi('getZones'),
    callApi('getPlants'),
    callApi('getDashboard'),
    callApi('getCureStatus')
  ]);
  state.zones = zones;
  state.plants = plants;
  state.dashboard = dashboard;
  state.cures = cures;
}

function zoneName(zoneId) {
  const z = state.zones.find(z => z['Zone ID'] === zoneId);
  return z ? z['Zone Name'] : zoneId;
}

// ============================================================
// RENDER: DASHBOARD
// ============================================================
function renderDashboard() {
  const d = state.dashboard;
  const activePlants = state.plants.filter(p => p['Status'] === 'Active');
  const harvestReady = activePlants.filter(p => p.harvestWindowOpens);
  const curingActive = state.cures.filter(c => !c.readyToSell);
  const readyToSell = state.cures.filter(c => c.readyToSell);

  let tasks = [];
  harvestReady.forEach(p => {
    tasks.push({ warn: true, text: p['Plant ID'] + ' is in the harvest window', sub: 'Day ' + p.dayNumber + ' — check trichomes with the loupe (70% milky / 30% amber on buds)' });
  });
  readyToSell.forEach(c => {
    tasks.push({ warn: true, text: c['Plant ID'] + ' cure is ready', sub: 'Jar started ' + fmtDate(c['Jar Start Date']) + ' — ' + c.daysCuring + ' days cured' });
  });
  curingActive.forEach(c => {
    tasks.push({ warn: false, text: c['Plant ID'] + ' still curing', sub: c.daysRemaining + ' days remaining (burp per schedule)' });
  });
  activePlants.forEach(p => {
    const dayLabel = p.dayNumber !== null ? 'Day ' + p.dayNumber : 'Day unknown';
    tasks.push({ warn: false, text: p['Plant ID'] + ' — ' + dayLabel + ', ' + (p.currentStage || 'stage TBC'), sub: p.targetWatt ? ('Target: ' + p.targetWatt + 'W' + (p.targetWattPercent ? ' (' + p.targetWattPercent + ')' : '') + ' at ' + p.targetHeightCm + 'cm') : 'Check light schedule for this zone' });
  });

  const html = `
    <div class="eyebrow">Today</div>
    <h1 class="page-title">Farm overview</h1>
    <div class="stat-grid">
      <div class="stat-card"><div class="num">${activePlants.length}</div><div class="label">Active plants</div></div>
      <div class="stat-card"><div class="num">${harvestReady.length}</div><div class="label">Harvest window</div></div>
      <div class="stat-card"><div class="num">${curingActive.length}</div><div class="label">Curing</div></div>
    </div>
    <div class="card">
      <div class="eyebrow">Tasks & watch list</div>
      ${tasks.length === 0 ? '<div class="empty-state">No active plants yet. Add one from the Plants tab.</div>' :
        tasks.map(t => `
          <div class="task-item">
            <div class="task-dot ${t.warn ? 'warn' : ''}"></div>
            <div class="task-text">${t.text}<div class="sub">${t.sub}</div></div>
          </div>
        `).join('')}
    </div>
  `;
  document.getElementById('app').innerHTML = html;
}

// ============================================================
// RENDER: PLANTS
// ============================================================
function ringSVG(dayNumber) {
  const pct = dayNumber === null ? 0 : Math.min(100, Math.round((dayNumber / 40) * 100));
  const r = 26, c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  return `
    <div class="ring-wrap">
      <svg width="62" height="62" viewBox="0 0 62 62">
        <circle class="ring-bg" cx="31" cy="31" r="${r}"></circle>
        <circle class="ring-fg" cx="31" cy="31" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"></circle>
      </svg>
      <div class="ring-day">${dayNumber !== null ? 'D' + dayNumber : '—'}</div>
    </div>
  `;
}

function renderPlants() {
  const byZone = {};
  state.plants.filter(p => p['Status'] === 'Active').forEach(p => {
    const z = p['Zone ID'];
    if (!byZone[z]) byZone[z] = [];
    byZone[z].push(p);
  });

  let zoneHtml = '';
  Object.keys(byZone).sort().forEach(zoneId => {
    const plants = byZone[zoneId];
    zoneHtml += `
      <div class="zone-group">
        <div class="zone-heading">
          <h2>${zoneName(zoneId)}</h2>
          <span class="tag">${zoneId}</span>
        </div>
        ${plants.map(p => `
          <div class="card plant-card" onclick="openPlantDetail('${p['Plant ID']}')">
            ${ringSVG(p.dayNumber)}
            <div class="plant-info">
              <div class="name">${p['Plant ID']}</div>
              <div class="strain">${p['Strain']} · ${p['Category']}</div>
              <span class="stage-badge ${String(p.currentStage||'').includes('UNCONFIRMED') ? 'unconfirmed' : ''}">${p.currentStage || 'Stage TBC'}</span>
              ${p.targetWatt ? `<div class="target">Target: ${p.targetWatt}W${p.targetWattPercent ? ' ('+p.targetWattPercent+')' : ''} · ${p.targetHeightCm}cm from canopy</div>` : ''}
              ${p.harvestWindowOpens ? `<div class="harvest-flag">Harvest window open</div>` : ''}
            </div>
            <div class="chev">&#8250;</div>
          </div>
        `).join('')}
      </div>
    `;
  });

  const html = `
    <div class="eyebrow">Grow Tracker</div>
    <h1 class="page-title">Your plants</h1>
    ${zoneHtml || '<div class="empty-state">No active plants recorded yet.</div>'}
    <button class="add-plant-btn" onclick="openAddPlant()">+ Add a plant</button>
  `;
  document.getElementById('app').innerHTML = html;
}

// ============================================================
// MODAL: PLANT DETAIL + LOG ENTRY
// ============================================================
async function openPlantDetail(plantId) {
  const plant = state.plants.find(p => p['Plant ID'] === plantId);
  if (!plant) return;

  showModal(`<div class="loading-spin">Loading log history...</div>`);
  const logs = await callApi('getLogs', { plantId: plantId });

  const logsHtml = logs.length === 0
    ? '<div class="empty-state">No log entries yet.</div>'
    : logs.slice().reverse().map(l => `
        <div class="log-entry">
          <span class="log-date">${fmtDate(l['Date'])}</span>
          <div class="log-meta">${l['Watt'] ? l['Watt']+'W' : ''} ${l['Watt Percent'] ? '('+l['Watt Percent']+')' : ''} ${l['Height cm'] ? '· '+l['Height cm']+'cm' : ''} ${l['Water ml'] ? '· '+l['Water ml']+'ml water' : ''}</div>
          ${l['Observations'] ? `<div class="log-obs">${l['Observations']}</div>` : ''}
        </div>
      `).join('');

  const content = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2>${plant['Plant ID']}</h2>
    <div class="modal-sub">${plant['Strain']} · ${zoneName(plant['Zone ID'])} · Day ${plant.dayNumber !== null ? plant.dayNumber : '?'} · ${plant.currentStage || 'Stage TBC'}</div>

    <button class="btn btn-primary" onclick="openLogForm('${plant['Plant ID']}','${plant['Zone ID']}')">+ Add log entry</button>

    ${plant.harvestWindowOpens ? `<button class="btn btn-ghost" style="margin-top:8px;" onclick="openHarvestForm('${plant['Plant ID']}')">Log harvest</button>` : ''}

    <div class="eyebrow" style="margin-top:20px;">Log history</div>
    <div class="card">${logsHtml}</div>
  `;
  showModal(content);
}

async function submitLog(plantId, zoneId) {
  const data = {
    plantId: plantId,
    zoneId: zoneId,
    date: document.getElementById('logDate').value,
    watt: document.getElementById('logWatt').value,
    wattPercent: document.getElementById('logWattPercent').value,
    heightCm: document.getElementById('logHeight').value,
    waterMl: document.getElementById('logWater').value,
    feedType: document.getElementById('logFeedType').value,
    feedAmount: document.getElementById('logFeedAmount').value,
    tempC: document.getElementById('logTemp').value,
    rhPercent: document.getElementById('logRH').value,
    observations: document.getElementById('logObs').value,
    photoUrl: document.getElementById('logPhoto').value
  };
  try {
    const result = await callApi('addLogEntry', { data: JSON.stringify(data) });
    if (result.warning) {
      const w = document.getElementById('logWarning');
      w.textContent = '⚠ ' + result.warning;
      w.classList.add('show');
    } else {
      const s = document.getElementById('logSuccess');
      s.textContent = 'Entry saved.';
      s.classList.add('show');
      setTimeout(async () => { await loadAll(); closeModal(); renderView(); }, 900);
    }
  } catch (e) {
    alert('Could not save: ' + e.message);
  }
}

async function submitAddPlant() {
  const data = {
    plantId: document.getElementById('apId').value,
    zoneId: document.getElementById('apZone').value,
    strain: document.getElementById('apStrain').value,
    category: document.getElementById('apCategory').value,
    plantDate: document.getElementById('apDate').value,
    potSize: document.getElementById('apPot').value,
    notes: document.getElementById('apNotes').value
  };
  if (!data.plantId || !data.strain) { alert('Plant ID and strain are required.'); return; }
  try {
    await callApi('addPlant', { data: JSON.stringify(data) });
    const s = document.getElementById('apSuccess');
    s.textContent = 'Plant added.';
    s.classList.add('show');
    setTimeout(async () => { await loadAll(); closeModal(); renderView(); }, 900);
  } catch (e) {
    alert('Could not add plant: ' + e.message);
  }
}

// ============================================================
// RENDER: CALCULATOR
// ============================================================
function renderCalculator() {
  const zoneOptions = state.zones.map(z => `<option value="${z['Zone ID']}">${z['Zone Name']} (${z['Total Watt']}W)</option>`).join('');
  const html = `
    <div class="eyebrow">Before you touch the light</div>
    <h1 class="page-title">Watt-per-plant calculator</h1>
    <div class="card">
      <label>Zone</label>
      <select id="calcZone">${zoneOptions}</select>
      <label>Number of plants in this zone right now</label>
      <input type="number" id="calcCount" min="1" placeholder="e.g. 3">
      <button class="btn btn-primary" style="margin-top:14px;" onclick="runCalc()">Calculate</button>
      <div class="calc-result" id="calcResult"></div>
    </div>
  `;
  document.getElementById('app').innerHTML = html;
}

async function runCalc() {
  const zoneId = document.getElementById('calcZone').value;
  const count = document.getElementById('calcCount').value;
  if (!count || count <= 0) { alert('Enter how many plants are in this zone.'); return; }
  try {
    const result = await callApi('calculateWattPerPlant', { zoneId: zoneId, plantCount: count });
    const box = document.getElementById('calcResult');
    let assessClass = 'neutral';
    if (result.assessment.indexOf('Within') === 0) assessClass = 'ok';
    if (result.assessment.indexOf('Above') === 0 || result.assessment.indexOf('Below') === 0) assessClass = 'warn';
    box.innerHTML = `
      <div class="calc-formula">${result.totalWatt}W <span class="eq">÷</span> ${result.plantCount} plants <span class="eq">=</span> ${result.wattPerPlant}W/plant</div>
      <div class="calc-assessment ${assessClass}">${result.assessment}</div>
    `;
    box.classList.add('show');
  } catch (e) {
    alert('Could not calculate: ' + e.message);
  }
}

// ============================================================
// MODAL HELPERS
// ============================================================
function showModal(html) {
  document.getElementById('modalSheet').innerHTML = html;
  document.getElementById('modalBackdrop').classList.add('open');
}
function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
}
document.getElementById('modalBackdrop').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ============================================================
// NAV + BOOT
// ============================================================
function renderView() {
  if (state.view === 'dashboard') renderDashboard();
  else if (state.view === 'plants') renderPlants();
  else if (state.view === 'calculator') renderCalculator();
}

document.querySelectorAll('.bottom-nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.view = btn.dataset.view;
    renderView();
  });
});

async function boot() {
  try {
    await loadAll();
    renderView();
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="empty-state">Could not connect to the Master Sheet.<br>${e.message}</div>`;
  }
}
boot();
</script>
